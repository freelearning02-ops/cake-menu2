<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassa</title>
    <style>
        /* Əsas saytın arxa fon rəngi və sıfırlamalar */
        body {
            margin: 0;
            padding: 0;
            background-color: #23222e; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Mətnlərin yerləşdiyi konteyner */
        .kassa-konteyner {
            padding: 20px;
        }

        /* Güclü Neon effektli Azərbaycanca yazı */
        .az-text {
            color: #ffffff;
            font-size: 3.5rem; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            /* Qırmızı/Çəhrayı güclü neon parıltısı */
            text-shadow: 0 0 5px #fff, 
                         0 0 10px #ff4b5c, 
                         0 0 20px #ff4b5c, 
                         0 0 40px #ff4b5c;
        }

        /* İngiliscə daha balaca alt yazı */
        .en-text {
            color: #b5b3bc; 
            font-size: 1.5rem; 
            font-weight: 500;
            letter-spacing: 1px;
            margin: 0 0 40px 0; /* Düymə ilə məsafə üçün */
        }

        /* Geri qayıtmaq üçün neon düymə */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 30px;
            border: 2px solid #ff4b5c;
            border-radius: 25px;
            background: transparent;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 75, 92, 0.2);
            cursor: pointer;
        }

        /* Düymənin üzərinə gələndə (hover) işıqlanma effekti */
        .back-btn:hover {
            background-color: #ff4b5c;
            box-shadow: 0 0 15px #ff4b5c, 0 0 30px #ff4b5c;
            transform: scale(1.05); /* Düymə bir az böyüyür */
        }
    </style>
</head>
<body>

    <div class="kassa-konteyner">
        <h1 class="az-text">Kassaya yaxınlaşın</h1>
        <p class="en-text">Please approach the cash desk</p>
        
        <a href="yav2.html" class="back-btn">Geri Qayıt</a>
    </div>

</body>
</html>
